services:
  proxymanager:
    build: .
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/proxy_manager.db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      API_KEY: ${API_KEY:-proxymanager-v6-api-key}
      XRAY_PATH: /usr/local/bin/xray
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - proxymanager_data:/data
      - /usr/local/bin/xray:/usr/local/bin/xray:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  proxymanager_data:
